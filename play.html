<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Play - JCR Quiz Arena</title><link rel="stylesheet" href="css/style.css"></head><body>
<div class="navbar"><div class="navbar-brand"><img src="assets/JCR.jpg" alt="JCR" class="logo-sm"><span>JCR Quiz Arena</span></div></div>
<div class="container container-narrow">
<div id="screen-join" class="screen"><div class="card" style="text-align:center"><img src="assets/JCR.jpg" alt="JCR" class="logo" style="width:80px"><h2 class="section-title" style="margin-top:10px">Join a Game</h2><div class="form-group"><input type="text" id="input-pin" placeholder="Game PIN" maxlength="6" inputmode="numeric" pattern="[0-9]*" style="text-align:center;font-size:1.5rem;letter-spacing:6px"></div><div class="form-group"><input type="text" id="input-name" placeholder="Your Nickname" maxlength="20" style="text-align:center;font-size:1.1rem"></div><button id="btn-join" class="btn btn-green btn-full" onclick="joinGame()">Join Game</button><p id="join-status" class="status hidden"></p></div></div>
<div id="screen-lobby" class="screen hidden"><div class="card" style="text-align:center"><h2 style="font-size:1.6rem">You're in!</h2><p style="font-size:1.3rem;font-weight:700;margin:16px 0" id="lobby-name"></p><p class="status">Waiting for host to start...</p></div></div>
<div id="screen-question" class="screen hidden"><div class="question-header"><p class="question-counter" id="p-q-counter"></p><p class="question-text" id="p-q-text"></p></div><div class="timer-container"><div class="timer-circle" id="p-timer">--</div></div><div class="answer-grid" id="p-answers"></div><p id="p-status" class="status hidden"></p></div>
<div id="screen-feedback" class="screen hidden"><div class="feedback-screen"><div class="feedback-icon" id="fb-icon"></div><p class="feedback-text" id="fb-text"></p><p class="feedback-points" id="fb-points"></p><p class="feedback-rank" id="fb-rank"></p></div></div>
<div id="screen-final" class="screen hidden"><div style="text-align:center;padding:40px 20px"><p style="font-size:3rem">&#127881;</p><h2 class="section-title">Game Over!</h2><p style="font-size:1.3rem;margin:20px 0">Your Final Rank</p><p style="font-size:4rem;font-weight:900" id="final-rank"></p><p style="font-size:1.2rem;margin-top:10px">Score: <strong id="final-score"></strong></p><a href="play.html" class="btn btn-green btn-full mt-2">Play Again</a></div></div>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/player.js"></script>
</body></html>
